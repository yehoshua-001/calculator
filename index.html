<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Project: Calculator | The Odin Project</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="calculator">
            <div class="header">
                <h1>Calculator</h1>
            </div>
            <div class="display">
                <input id="display" type="text" value="" readonly>
            </div>
            <div class="button-container">
                <div class="operators">
                    <button id="operator">+</button>
                    <button id="operator">-</button>
                    <button id="operator">x</button>
                    <button id="operator">÷</button>
                </div>
                <div class="partition">
                    <div class="numbers">
                        <button id="number">7</button>
                        <button id="number">8</button>
                        <button id="number">9</button>
                        <button id="number">4</button>
                        <button id="number">5</button>
                        <button id="number">6</button>
                        <button id="number">1</button>
                        <button id="number">2</button>
                        <button id="number">3</button>
                        <button id="number" style="width: 180px;">0</button>
                        <button id="decimal">.</button>
                    </div>
                    <div class="options">
                        <button id="clear">C</button>
                        <button id="allClear">AC</button>
                        <button id="equal" style="height: 150px;">=</button>
                    </div>                    
                </div>
            </div>
        </div>
    </body>
</html>

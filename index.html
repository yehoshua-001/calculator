<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">

        <title>Project: Calculator | The Odin Project</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="container">
            <input type="text">
            <div class="buttons">
                <div class="operators">
                    <button id="operator">+</button>
                    <button id="operator">-</button>
                    <button id="operator">*</button>
                    <button id="operator">/</button>                    
                </div>
                <div class="partition">
                    <div class="numbers">
                        <button id="number">7</button>
                        <button id="number">8</button>
                        <button id="number">9</button>
                        <button id="number">4</button>
                        <button id="number">5</button>
                        <button id="number">6</button>
                        <button id="number">1</button>
                        <button id="number">2</button>
                        <button id="number">3</button>
                        <button id="number">0</button>
                        <button id="option">.</button>
                    </div>
                    <div class="options">
                        <button id="option">C</button>
                        <button id="option">=</button>
                    </div>                    
                </div>
            </div>
        </div>
    </body>
</html>
